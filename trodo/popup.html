<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TRODO</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true">
          <line x1="2" y1="10" x2="30" y2="10" class="grid-line" />
          <line x1="2" y1="16" x2="30" y2="16" class="grid-line" />
          <line x1="2" y1="22" x2="30" y2="22" class="grid-line" />
          <circle class="ticker-dot" cx="6" cy="16" r="2.4" />
        </svg>
        <span class="brand-name">TRODO</span>
      </div>
      <div class="vault-status" id="vaultStatus">
        <span class="dot dot--locked" id="vaultDot"></span>
        <span id="vaultLabel">Vault locked</span>
      </div>
    </header>

    <section class="vault-gate" id="vaultGate">
      <p class="hint">Unlock your local vault to view balances and let strategies run in the background.</p>
      <input type="password" id="passphraseInput" placeholder="Vault passphrase" autocomplete="off" />
      <button id="unlockBtn" class="btn btn--primary">Unlock</button>
      <p class="hint hint--muted">This passphrase never leaves your device and is never written to disk.</p>
    </section>

    <main class="content" id="mainContent" hidden>
      <div class="section-head">
        <h2>Linked accounts</h2>
        <button id="addAccountBtn" class="btn btn--ghost">+ Add</button>
      </div>
      <div id="accountList" class="account-list"></div>

      <div class="section-head">
        <h2>Activity</h2>
      </div>
      <div id="logList" class="log-list"></div>
    </main>

    <footer class="footer">
      <button id="optionsBtn" class="btn btn--link">Settings &amp; risk controls</button>
    </footer>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
